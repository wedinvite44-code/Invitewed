<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lupa Password - WedInvite</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --navy:#0f0f23; --gold:#c9a96e; --cream:#faf7f2; --white:#fff; --gray:#8a8a9a; --gray-light:#e8e8ee; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; }
.wi-forgot-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--navy); padding:40px; }
.wi-forgot-card { background:var(--white); border-radius:24px; padding:50px; max-width:460px; width:100%; text-align:center; }
.wi-forgot-icon { width:70px; height:70px; background:rgba(201,169,110,.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; font-size:28px; }
.wi-forgot-card h2 { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:var(--navy); margin-bottom:10px; }
.wi-forgot-card p { font-size:14px; color:var(--gray); line-height:1.6; margin-bottom:28px; }
.wi-form-group { margin-bottom:20px; text-align:left; }
.wi-form-label { display:block; font-size:13px; font-weight:600; color:var(--navy); margin-bottom:8px; }
.wi-form-input { width:100%; padding:14px 18px; border:2px solid var(--gray-light); border-radius:12px; font-size:14px; font-family:'Inter',sans-serif; color:var(--navy); transition:all .3s; }
.wi-form-input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 4px rgba(201,169,110,.1); }
.wi-btn-submit { width:100%; padding:16px; background:var(--navy); color:var(--white); border:none; border-radius:12px; font-size:14px; font-weight:600; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all .3s; font-family:'Inter',sans-serif; margin-top:10px; }
.wi-btn-submit:hover { background:var(--gold); color:var(--navy); }
.wi-auth-footer { text-align:center; margin-top:24px; font-size:14px; }
.wi-auth-footer a { color:var(--gold); text-decoration:none; font-weight:600; }
.wi-auth-footer a:hover { text-decoration:underline; }
@media (max-width:768px) { .wi-forgot-card { padding:30px 20px; } }
</style>
</head>
<body>
<div class="wi-forgot-page">
  <div class="wi-forgot-card">
    <div class="wi-forgot-icon">🔐</div>
    <h2>Lupa Password?</h2>
    <p>Masukkan email Anda dan kami akan mengirimkan link untuk mereset password Anda.</p>
    <form onsubmit="event.preventDefault(); alert('Link reset password telah dikirim ke email Anda!'); window.location.href='login.html';">
      <div class="wi-form-group">
        <label class="wi-form-label">Email</label>
        <input type="email" class="wi-form-input" placeholder="nama@email.com" required>
      </div>
      <button type="submit" class="wi-btn-submit">Kirim Link Reset</button>
    </form>
    <div class="wi-auth-footer">
      <a href="login.html">← Kembali ke Login</a>
    </div>
  </div>
</div>
</body>
</html>
